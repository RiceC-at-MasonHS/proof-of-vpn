<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proof of VPN</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2em;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #0056b3;
        }
        p {
            font-size: 1.2em;
        }
        .hostname {
            font-weight: bold;
            color: #d9534f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Proof of Network Membership</h1>
        <p>This page is currently being served from:</p>
        <p class="hostname" id="hostname">{{ server_ip }}</p>
    <p><small>A simple website to prove network membership (when studying VPNs in Cyber).<br>Designed to look nice in browsers and via cURL requests.</small></p>
    </div>
    <script>
        // Fallback for when not served by the Python server or Jinja
        if (document.getElementById('hostname').textContent.trim() === '') {
            document.getElementById('hostname').textContent = window.location.hostname || "localhost";
        }
    </script>
</body>
</html>
